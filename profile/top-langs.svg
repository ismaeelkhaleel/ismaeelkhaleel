    <rect x="0" y="8" width="320" height="6" rx="3" fill="#30363d" />
    <rect x="0" y="8" width="42.11405049234524" height="6" rx="3" fill="#DA5B0B" />
  </g>

  <g class="stagger" style="animation-delay: 200ms" transform="translate(25, 123)">
    <text class="label" x="0" y="0">CSS</text>
