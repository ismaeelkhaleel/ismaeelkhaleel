<svg width="370" height="269" viewBox="0 0 370 269" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 600 18px 'Segoe UI', Ubuntu, sans-serif; fill: #1abc9c; }
    .label { font: 400 13px 'Segoe UI', Ubuntu, sans-serif; fill: #c9d1d9; }
    .value { font: 600 13px 'Segoe UI', Ubuntu, sans-serif; fill: #c9d1d9; }
    .stagger { opacity: 0; animation: fadeIn 0.4s ease-in-out forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
  <rect x="0.5" y="0.5" rx="8" width="369" height="268" fill="#0d1117" stroke="#30363d" />
  <text x="25" y="35" class="title">Most Used Languages</text>
  
  <g class="stagger" style="animation-delay: 0ms" transform="translate(25, 55)">
    <text class="label" x="0" y="0">JavaScript</text>
    <text class="value" x="320" y="0" text-anchor="end">73.8%</text>
    <rect x="0" y="8" width="320" height="6" rx="3" fill="#30363d" />
    <rect x="0" y="8" width="236.1349659557767" height="6" rx="3" fill="#f1e05a" />
  </g>

  <g class="stagger" style="animation-delay: 100ms" transform="translate(25, 89)">
