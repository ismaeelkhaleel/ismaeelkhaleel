  </g>

  <g class="stagger" style="animation-delay: 300ms" transform="translate(25, 157)">
    <text class="label" x="0" y="0">HTML</text>
    <text class="value" x="320" y="0" text-anchor="end">4.3%</text>
    <rect x="0" y="8" width="320" height="6" rx="3" fill="#30363d" />
